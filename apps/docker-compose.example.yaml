# Usage:
#   cp docker-compose.example.yaml docker-compose.yaml
#   docker compose up -d
#
# 所有 bootstrap 配置都能通过 BN_* 环境变量配,bn.config.yaml 完全可选。
# 如需用文件配置:先 `docker compose run --rm bilibili-notify cat /app/bn.config.example.yaml > bn.config.yaml`
# 编辑后再取消注释下方那行 volume。**不要直接挂一个不存在的 yaml 文件路径** —
# docker 会自动建空目录,容器读目录直接 EISDIR 挂掉,陷入 restart loop。

services:
  bilibili-notify:
    image: akokk0/bilibili-notify:latest
    # Or build locally:
    # build:
    #   context: ..
    #   dockerfile: apps/Dockerfile
    container_name: bilibili-notify
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      BN_LOG_LEVEL: info
      # TZ: Asia/Shanghai          # 时区(决定日志/历史按日切文件的本地"今天",镜像默认已设)
      # BN_DASHBOARD_USER: admin
      # BN_DASHBOARD_PASS: change-me
    volumes:
      - ./data:/data
      # 仅当确实需要用 yaml 配置(而非 BN_* 环境变量)时取消注释,且确保 host 文件存在:
      # - ./bn.config.yaml:/app/apps/server/bn.config.yaml:ro
    # depends_on:
    #   - napcat

  # Optional NapCat sidecar (OneBot v11). Configure via WebUI on first launch,
  # then add PushTarget platform=onebot baseUrl=http://napcat:3000 in dashboard.
  # napcat:
