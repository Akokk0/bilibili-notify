# Bootstrap config for the standalone server.
#
# Usage: copy to `bn.config.yaml` (which is gitignored) and edit.
#
# 加载模型(由 BN_CONFIG 切换):
#   - 设了 BN_CONFIG(docker 部署主路径):**B 模型** — env 仅在首次启动 seed 进
#     ${BN_CONFIG} 指定的 yaml,之后 loader 忽略所有 env,以文件为真相。
#     改配置 = 编辑 yaml + 重启;重置 = 删 yaml + 重启。
#   - 未设 BN_CONFIG(dev / 跑测试):**legacy 12-factor** — file < ENV < CLI 三层 merge。
#
# `${VAR}` 占位在 YAML 字符串值里会从 process.env 插值(两条模型下都生效)。
#
# Schema source: apps/server/src/config/schema.ts

server:
  host: 127.0.0.1   # 仅本机;线上反代后端设 0.0.0.0
  port: 8787

# 状态文件落点：globals.json / subscriptions.json / targets.json / secrets/ / history/
dataDir: ./data

# 卡片实时预览需要本地 Chrome / Chromium。
# 不配则 /api/cards/preview 返回 503,前端 /cards 页会渲染配置提示。
# macOS:   /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
# Linux:   /usr/bin/google-chrome  或  /usr/bin/chromium
# Windows: C:/Program Files/Google/Chrome/Application/chrome.exe
# chromePath: ${BN_CHROME_PATH}

# Dashboard 静态资源目录。Docker 镜像固定为 /app/web-dist;
# 手写 Docker 配置时必须保留,否则 http://<host>:8787/ 会返回 404。
webDistDir: /app/web-dist

logLevel: info   # fatal | error | warn | info | debug | trace | silent

# secrets(B 站 cookie / AI apiKey)静态加密密钥(AES-256-GCM)。
# 设置后由该口令 scrypt 派生密钥、绝不落盘 = 真正的静态加密;
# 不设则回退到 <dataDir>/secrets 下随机密钥文件(仅混淆),启动会打显著告警。
# 生成一次并妥善保管(建议走环境变量):openssl rand -base64 32
# cookieEncryptionKey: ${BN_COOKIE_KEY}

# Basic Auth 与 WS Origin 白名单都可选;开发期可整段留空。
# auth:
#   basicAuth:
#     username: admin
#     password: ${BN_DASHBOARD_PASS}
#   allowedOrigins:
#     - http://127.0.0.1:5173
#     - http://127.0.0.1:5174
