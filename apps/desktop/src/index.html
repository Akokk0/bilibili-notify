<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bilibili Notify</title>
		<style>
			:root {
				color: #f6f7fb;
				background: #10131a;
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
					"Microsoft YaHei", sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background:
					radial-gradient(circle at top left, rgba(44, 123, 229, 0.24), transparent 34rem),
					linear-gradient(135deg, #10131a 0%, #171b25 100%);
			}

			main {
				display: flex;
				min-height: 100vh;
				align-items: center;
				justify-content: center;
				padding: 48px 24px;
			}

			.card {
				width: min(720px, 100%);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 24px;
				background: rgba(18, 22, 31, 0.86);
				box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
				padding: 32px;
				backdrop-filter: blur(18px);
			}

			h1 {
				margin: 0 0 12px;
				font-size: 28px;
				font-weight: 750;
			}

			p {
				margin: 0;
				color: #b9c1d4;
				line-height: 1.8;
			}

			.status {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 24px;
				border-radius: 999px;
				background: rgba(114, 177, 255, 0.12);
				padding: 8px 14px;
				color: #9bc6ff;
				font-size: 14px;
				font-weight: 650;
			}

			.dot {
				width: 10px;
				height: 10px;
				border-radius: 999px;
				background: #72b1ff;
				box-shadow: 0 0 20px rgba(114, 177, 255, 0.9);
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin-top: 28px;
			}

			button {
				border: 0;
				border-radius: 12px;
				background: #72b1ff;
				color: #09111f;
				cursor: pointer;
				font: inherit;
				font-weight: 700;
				padding: 11px 16px;
			}

			button.secondary {
				background: rgba(255, 255, 255, 0.1);
				color: #f6f7fb;
			}

			button:disabled {
				cursor: wait;
				opacity: 0.56;
			}

			.detail {
				margin-top: 20px;
				border-radius: 16px;
				background: rgba(0, 0, 0, 0.22);
				padding: 16px;
				color: #d5dbee;
				font-family: "SFMono-Regular", Consolas, monospace;
				font-size: 13px;
				white-space: pre-wrap;
			}
		</style>
	</head>
	<body>
		<main>
			<section class="card">
				<div class="status"><span class="dot"></span><span id="statusText">正在启动后端服务</span></div>
				<h1>Bilibili Notify 桌面版</h1>
				<p id="message">正在启动本机后端。服务就绪后会自动打开 Dashboard。</p>
				<div class="actions">
					<button id="retryButton" type="button">重试启动</button>
					<button id="panelButton" class="secondary" type="button">打开 Dashboard</button>
					<button id="serverLogButton" class="secondary" type="button">打开后端日志</button>
					<button id="logButton" class="secondary" type="button">打开启动器日志</button>
					<button id="dataButton" class="secondary" type="button">打开数据目录</button>
					<button id="dockButton" class="secondary" type="button">隐藏 Dock 图标</button>
					<button id="quitButton" class="secondary" type="button">退出应用</button>
				</div>
				<div id="detail" class="detail" hidden></div>
			</section>
		</main>
		<script>
			const invoke = window.__TAURI__?.core?.invoke;
			const statusText = document.getElementById("statusText");
			const message = document.getElementById("message");
			const detail = document.getElementById("detail");
			const retryButton = document.getElementById("retryButton");
			const panelButton = document.getElementById("panelButton");
			const serverLogButton = document.getElementById("serverLogButton");
			const logButton = document.getElementById("logButton");
			const dataButton = document.getElementById("dataButton");
			const dockButton = document.getElementById("dockButton");
			const quitButton = document.getElementById("quitButton");

			function setBusy(busy) {
				retryButton.disabled = busy;
				panelButton.disabled = busy;
			}

			function showDetail(text) {
				detail.hidden = !text;
				detail.textContent = text || "";
			}

			function showCommandError(error) {
				showDetail(error instanceof Error ? error.message : String(error));
			}

			async function refreshState() {
				if (!invoke) {
					statusText.textContent = "Tauri API 不可用";
					message.textContent = "请在 Tauri 桌面壳中打开此页面。";
					showDetail("window.__TAURI__.core.invoke 不存在");
					return;
				}
				const state = await invoke("get_launcher_state");
				statusText.textContent = state.statusLabel;
				message.textContent = state.message;
				showDetail(state.detail);
				setBusy(state.status === "starting");
				panelButton.disabled = state.status === "starting" || !state.panelUrl;
				dockButton.disabled = !state.dockToggleAvailable;
				dockButton.textContent = state.dockHidden ? "显示 Dock 图标" : "隐藏 Dock 图标";
				dockButton.title = state.dockToggleAvailable ? "" : "当前平台或菜单栏图标不可用";
				if (state.status === "ready" && state.panelUrl) {
					window.location.replace(state.panelUrl);
				}
			}

			retryButton.addEventListener("click", async () => {
				setBusy(true);
				try {
					await invoke("retry_service");
				} finally {
					await refreshState();
				}
			});
			panelButton.addEventListener("click", async () => {
				try {
					await invoke?.("open_panel_in_browser");
				} catch (error) {
					showCommandError(error);
				}
			});
			serverLogButton.addEventListener("click", async () => {
				try {
					await invoke?.("open_server_log_dir");
				} catch (error) {
					showCommandError(error);
				}
			});
			logButton.addEventListener("click", async () => {
				try {
					await invoke?.("open_launcher_log_dir");
				} catch (error) {
					showCommandError(error);
				}
			});
			dataButton.addEventListener("click", async () => {
				try {
					await invoke?.("open_data_dir");
				} catch (error) {
					showCommandError(error);
				}
			});
			dockButton.addEventListener("click", async () => {
				try {
					await invoke?.("toggle_dock_icon");
					await refreshState();
				} catch (error) {
					await refreshState();
					showCommandError(error);
				}
			});
			quitButton.addEventListener("click", async () => {
				try {
					await invoke?.("quit_app");
				} catch (error) {
					showCommandError(error);
				}
			});
			refreshState();
			setInterval(refreshState, 1000);
		</script>
	</body>
</html>
