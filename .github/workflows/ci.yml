name: CI

on:
  push:
    branches: [dev, refactor]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Installs Vite+ (vp) globally, the repo-pinned Node from .node-version
      # (24.15.0), and runs `vp install`. On GitHub Actions CI=true → the
      # underlying pnpm install is frozen-lockfile automatically (= old
      # `pnpm install --frozen-lockfile`). `cache: true` keys off pnpm-lock.yaml.
      - name: Setup Vite+ (vp) + Node + deps
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Lint (Biome)
        run: vp exec biome ci .

      # `vp run build` runs the root build script (pnpm -r run build + koishi
      # console client); vp injects the embedded pnpm into the subprocess PATH
      # so the legacy script body keeps working. This is the double-end build
      # (packages + koishi shells + apps/server tsdown + apps/web Vite).
      - name: Build (double-end)
        run: vp run build

      # setup-vp 的 cache 命中后,有时 workspace 包的子 node_modules 链接
      # 没完整建出来(出现 `Local package.json exists, but node_modules missing`
      # 警告 + tsc exit 2)。typecheck 前显式跑一次 install,空操作命中链接
      # 已就位则瞬间结束,缺失则补齐 —— 比关 cache 廉价得多。
      - name: Ensure workspace links
        run: vp install --frozen-lockfile

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp test run
