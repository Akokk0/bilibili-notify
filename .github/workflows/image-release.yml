name: bilibili-notify — build + publish

# Required repo secret: DOCKERHUB_TOKEN
# GHCR uses the workflow GITHUB_TOKEN (packages: write).

on:
  # 推 v<VERSION> tag 后触发。Docker 以 tag 为发布版本源,
  # 构建前由 sync-standalone-version.sh 临时写入各处版本元数据。
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, skip push / manifest publish"
        type: boolean
        default: true
      version:
        description: "Standalone version for dry-run builds, e.g. 0.1.0-alpha.7"
        type: string
        required: true

# 串行化 image-release —— 同 ref 上的并发 run 一律排队,避免两个 push 同时跑
# 让 Docker tag 与 git tag / GitHub Release 失同步。cancel-in-progress: false
# 因为发版有副作用(已 push 的 Docker layer / manifest)不该半途打断 —— 串行
# 等更安全。
concurrency:
  group: image-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # contents 只读:本 workflow 不创建 git tag / GitHub Release。
  contents: read
  # GHCR 发布使用 GITHUB_TOKEN,需要写 package 权限。
  packages: write

env:
  DOCKERHUB_IMAGE: docker.io/akokk0/bilibili-notify
  GHCR_IMAGE: ghcr.io/akokk0/bilibili-notify
  # tag push 一律是正式发布;workflow_dispatch 勾 dry_run 时只构建不 push / merge。
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

jobs:
  # ---------------------------------------------------------------------------
  # 拆 amd64 / arm64 到各自原生 runner —— 避免 GHA x86 runner 用 QEMU emulated
  # arm64 跑 vp pack / vite 等 native binary 时慢 10-20 倍(实测 emulated arm64
  # build 跑过 1.5h+ 仍未完)。GitHub 2024 上线公共 ARM runner(ubuntu-24.04-arm),
  # 免费给 public repo 用。
  #
  # 每 job 只产出 push-by-digest 镜像(只 push manifest digest,不带 tag);最
  # 终 manifest list 由 merge job 拼装,带上完整 tag 集合(:v* / :alpha / :latest
  # / :<sha>)。模式参考 docker 官方 distribute build doc:
  #   https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform.arch }})
    # ref guard:正式发布只接受 v* tag;手动 dispatch 只允许 dev dry-run。
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && inputs.dry_run)
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert standalone tag format
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash .github/scripts/assert-ref-matches-standalone-version.sh

      - name: Assert release commit is on dev
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash .github/scripts/assert-release-ref-on-dev.sh

      - name: Setup Vite+ (vp) + Node
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Sync standalone version metadata
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: bash .github/scripts/sync-standalone-version.sh

      # 就地生成 apps/web/public/sponsors.json,经 Dockerfile `COPY . .` 进 builder →
      # vite build 打进 web dist/镜像。不回写仓库(同 sync-standalone-version)。未配
      # AFDIAN secret(如 fork)时脚本优雅跳过,镜像内名单回退空态。
      - name: Fetch afdian sponsors
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
        run: node scripts/fetch-sponsors.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: env.DRY_RUN == 'false'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: akokk0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: env.DRY_RUN == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # build push-by-digest:每个 registry 单独跑一次 build-push-action。不要把
      # Docker Hub + GHCR 写成同一个 buildx 命令的两个 output:buildx 会给两个
      # registry 生成不同的 provenance/manifest-list digest,而 action 只暴露最后
      # 一个 digest,导致 Docker Hub smoke / manifest merge 拿到 GHCR digest。
      # dry-run(${{ env.DRY_RUN }} == 'true')时 push=false 不污染 registry。
      - name: Build + push Docker Hub digest
        id: build_dockerhub
        # 不再 pin v7.1.0:alpha.5 构建 amd64 / arm64 双双卡在本步(Build +
        # push-by-digest),非单一 arch / 版本特有 → 排除 build-push-action 版本嫌疑,
        # 回到 @v7 主标签。
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          outputs: |
            type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ env.DRY_RUN == 'true' && 'false' || 'true' }}
          # 彻底关闭 GHA cache:此前 mode=max 卡 arm64、改 mode=min 后 alpha.5 仍双
          # arch 卡死本步 —— 高度怀疑 GHA Cache API 导入/导出节流 hang(moby/buildkit
          # #2804 一类)。先完全去掉 cache-from/cache-to 验证。无 cache → builder 阶段
          # (pnpm install / build)每次全量重跑,arm64 +4-5min / amd64 +3-4min,发版
          # 频率低可接受。若确认缓存是元凶,再按 arch scope 谨慎恢复(或换 type=registry)。

      # Smoke 只在 amd64 跑 —— GHA arm64 runner 也能跑自家镜像但意义不大:
      # smoke 验的是"镜像启动 + /api/health + dashboard 静态资源",amd64 验过
      # 就够;arm64 镜像本身的可用性由同一份 Dockerfile + Docker 单架构语义保
      # 证。dry-run 模式不 push,无 digest 可拉,跳过。
      #
      # 脚本本体在 .github/scripts/smoke-image.sh —— inline 同款逻辑提到文件:
      # editor 给 bash 高亮、shellcheck 走得动、本地可手动跑(IMAGE_REF=... bash
      # .github/scripts/smoke-image.sh)。容器清理脚本内 EXIT trap 包办,不再
      # 单独 Stop step。
      - name: Smoke test (amd64 only)
        if: matrix.platform.arch == 'amd64' && env.DRY_RUN == 'false'
        env:
          IMAGE_REF: ${{ env.DOCKERHUB_IMAGE }}@${{ steps.build_dockerhub.outputs.digest }}
        run: bash .github/scripts/smoke-image.sh

      - name: Export Docker Hub digest
        if: env.DRY_RUN == 'false'
        env:
          ARCH: ${{ matrix.platform.arch }}
          DIGEST: ${{ steps.build_dockerhub.outputs.digest }}
          DIGESTS_DIR: /tmp/digests/dockerhub
        run: bash .github/scripts/export-image-digest.sh

      - name: Build + push GHCR digest
        id: build_ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          outputs: |
            type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ env.DRY_RUN == 'true' && 'false' || 'true' }}

      - name: Export GHCR digest
        if: env.DRY_RUN == 'false'
        env:
          ARCH: ${{ matrix.platform.arch }}
          DIGEST: ${{ steps.build_ghcr.outputs.digest }}
          DIGESTS_DIR: /tmp/digests/ghcr
        run: bash .github/scripts/export-image-digest.sh

      # 把 digest 写到 artifact,merge job 收回拼 manifest list。文件名 = arch,
      # merge 用 `pattern: digest-*` + `merge-multiple: true` 把两个 registry × 两个
      # arch 的 digest 拉到同一个 /tmp/digests 目录,再按 DIGESTS_DIR 分 registry 读取。
      - name: Upload digest
        if: env.DRY_RUN == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform.arch }}
          path: |
            /tmp/digests/dockerhub/${{ matrix.platform.arch }}
            /tmp/digests/ghcr/${{ matrix.platform.arch }}
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Merge:拼 manifest list 并推 Docker Hub + GHCR
  #
  # build matrix 两个 arch 都成功后才跑;从 artifact 拿 digests,docker buildx
  # imagetools create 把它们组合成 manifest list(amd64 + arm64),带上完整 tag
  # 集合(:v*, :alpha 或 :latest, :<sha>)推两个 registry。GitHub Release /
  # Desktop assets 由 desktop-release 独立处理。
  # ---------------------------------------------------------------------------
  merge:
    name: Merge & publish manifest
    runs-on: ubuntu-latest
    needs: [build]
    # ref guard 同 build job;DRY_RUN gate 在 job-level 内联展开 —— env.* 不能
    # 在 job.if 引用(GHA expression context 限制),只 step.if 才能读 env。
    if: |
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # 不 persist token:checkout 默认会把 token 写入 .git/config 的
          # `http.<host>.extraheader`,之后整个 job 内任意 step 都能从工作区 git
          # 配置里读出 PAT —— 哪怕该 step 不需要写权限。设 false 后 token 不落盘,
          # 本 job 不需要 git 写操作;GitHub Release 读取由 gh 通过 GH_TOKEN 完成。
          persist-credentials: false

      - name: Assert release commit is on dev
        run: bash .github/scripts/assert-release-ref-on-dev.sh

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: akokk0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # 独立端版本号来自当前 v<VERSION> tag。
      # 含 prerelease 标识(有 `-`,如 0.1.0-alpha.0)→ alpha 渠道,否则正式。
      # 脚本本体在 .github/scripts/read-standalone-version.sh。
      - name: Read standalone version
        id: ver
        run: bash .github/scripts/read-standalone-version.sh

      - name: Read checkout commit
        id: commit
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute Docker Hub metadata
        id: meta_dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          # 渠道按版本串判定:prerelease → :alpha,纯 semver → :latest。另打不可变
          # 版本 tag :vX.Y.Z[-alpha.N] 与每-commit :<short-sha>。
          tags: |
            type=raw,value=latest,enable=${{ steps.ver.outputs.prerelease == 'false' }}
            type=raw,value=alpha,enable=${{ steps.ver.outputs.prerelease == 'true' }}
            type=raw,value=v${{ steps.ver.outputs.value }}
            type=raw,value=${{ steps.commit.outputs.short }}

      - name: Compute GHCR metadata
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ steps.ver.outputs.prerelease == 'false' }}
            type=raw,value=alpha,enable=${{ steps.ver.outputs.prerelease == 'true' }}
            type=raw,value=v${{ steps.ver.outputs.value }}
            type=raw,value=${{ steps.commit.outputs.short }}

      # image-release 推 Docker :v<VERSION> 前只校验同名 tag 必须已存在且指向
      # 当前 checkout commit;不等待 Desktop Release / assets,避免桌面端阻塞 Docker 镜像发布。
      - name: Assert version tag compatibility
        env:
          VERSION: ${{ steps.ver.outputs.value }}
          REQUIRE_EXISTING_TAG: "1"
        run: bash .github/scripts/assert-version-tag-compatible.sh

      # imagetools create 用 digest list 组合 manifest,带 metadata 的全部 tag 一并推。
      # docker metadata-action 输出的 tags 是换行分隔字符串;本 workflow 只负责 Docker image。
      # 脚本本体在 .github/scripts/create-manifest-list.sh。
      - name: Create + push Docker Hub manifest list
        env:
          IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          TAGS: ${{ steps.meta_dockerhub.outputs.tags }}
          DIGESTS_DIR: /tmp/digests/dockerhub
        run: bash .github/scripts/create-manifest-list.sh

      - name: Create + push GHCR manifest list
        env:
          IMAGE: ${{ env.GHCR_IMAGE }}
          TAGS: ${{ steps.meta_ghcr.outputs.tags }}
          DIGESTS_DIR: /tmp/digests/ghcr
        run: bash .github/scripts/create-manifest-list.sh
