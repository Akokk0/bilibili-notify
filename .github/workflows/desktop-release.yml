name: bilibili-notify — desktop release

on:
  # 推 v<VERSION> tag 后触发。Desktop 以 tag 为发布版本源,
  # 构建前由 sync-standalone-version.sh 临时写入各处版本元数据。
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build desktop artifacts only, skip GitHub Release"
        type: boolean
        default: true
      version:
        description: "Standalone version for dry-run builds, e.g. 0.1.0-alpha.7"
        type: string
        required: true

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

jobs:
  build:
    name: Build ${{ matrix.id }}
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && inputs.dry_run)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mac-arm64
            runner: macos-14
            bundles: dmg,app
          - id: win-x64
            runner: windows-latest
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert standalone tag format
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash .github/scripts/assert-ref-matches-standalone-version.sh

      - name: Assert release commit is on dev
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash .github/scripts/assert-release-ref-on-dev.sh

      - name: Setup Vite+ (vp) + Node + deps
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true

      - name: Read standalone version
        id: ver
        shell: bash
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: bash .github/scripts/read-standalone-version.sh

      - name: Install Rust lint components
        run: rustup component add rustfmt clippy

      - name: Prepare Desktop Rust check
        run: vp run -F @bilibili-notify/desktop prepare-rust-check

      - name: Check Desktop Rust format
        run: vp run -F @bilibili-notify/desktop cargo:fmt

      - name: Lint Desktop Rust
        run: vp run -F @bilibili-notify/desktop cargo:clippy

      - name: Test Desktop Rust
        run: vp run -F @bilibili-notify/desktop cargo:test

      - name: Check Desktop Rust compile
        run: vp run -F @bilibili-notify/desktop cargo:check

      # 在 web build 之前就地生成 apps/web/public/sponsors.json,vite build 会把它复制进
      # dist(随后进 Tauri bundle)。不回写仓库。未配 AFDIAN secret 时脚本优雅跳过,名单空态。
      - name: Fetch afdian sponsors
        shell: bash
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
        run: node scripts/fetch-sponsors.mjs

      - name: Build apps runtime
        env:
          BN_STANDALONE_VERSION: ${{ steps.ver.outputs.value }}
        run: vp run build:apps

      - name: Sync standalone version metadata
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.value }}
        run: bash .github/scripts/sync-standalone-version.sh

      - name: Verify macOS arm64 runner
        if: matrix.id == 'mac-arm64'
        run: bash .github/scripts/verify-macos-arm64-runner.sh

      - name: Build Tauri bundle
        shell: bash
        env:
          TAURI_BUNDLES: ${{ matrix.bundles }}
        run: bash .github/scripts/build-tauri-bundle.sh

      - name: Collect macOS artifacts
        if: matrix.id == 'mac-arm64'
        run: bash .github/scripts/collect-macos-desktop-artifacts.sh

      - name: Collect Windows artifacts
        if: matrix.id == 'win-x64'
        shell: pwsh
        run: ./.github/scripts/collect-windows-desktop-artifacts.ps1

      - name: Assert macOS artifact contents
        if: matrix.id == 'mac-arm64'
        run: bash .github/scripts/assert-macos-desktop-artifact.sh

      - name: Assert Windows portable artifact contents
        if: matrix.id == 'win-x64'
        shell: pwsh
        run: ./.github/scripts/assert-windows-desktop-artifact.ps1

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.id }}
          path: desktop-artifacts/*
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Assert release commit is on dev
        run: bash .github/scripts/assert-release-ref-on-dev.sh

      - name: Validate release token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: bash .github/scripts/validate-release-token.sh

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          path: desktop-artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Read standalone version
        id: ver
        run: bash .github/scripts/read-standalone-version.sh

      - name: Assert version tag compatibility
        env:
          VERSION: ${{ steps.ver.outputs.value }}
          REQUIRE_EXISTING_TAG: "1"
        run: bash .github/scripts/assert-version-tag-compatible.sh

      - name: Create GitHub release
        env:
          VERSION: ${{ steps.ver.outputs.value }}
          PRERELEASE: ${{ steps.ver.outputs.prerelease }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/create-desktop-github-release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh release upload "v${{ steps.ver.outputs.value }}" desktop-artifacts/* --clobber
