name: Sync sponsors

# 半自动赞助者名单:定时从爱发电拉取 → apps/web/public/sponsors.json,有变更则 commit 回 dev。
# token 只活在仓库 secret,运行时/镜像零密钥。前端(About 页)运行时读这个静态文件渲染。
#
# 配置(仓库 Settings → Secrets and variables → Actions):
#   AFDIAN_USER_ID / AFDIAN_TOKEN —— 均在 https://afdian.com/dashboard/dev 获取。
#
# 注意:GitHub 的 `schedule` 只在**默认分支**(main)上的 workflow 文件生效;本文件需先随
# dev → main 合并后,定时才会触发。任何时候都可在 Actions 页用 workflow_dispatch 手动跑。
# 本 job 显式 checkout dev 并提交回 dev(名单更新走正常开发流,随后再 dev → main)。

on:
  schedule:
    - cron: "0 18 * * *" # 每日 02:00 (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      # 脚本零依赖(只用 node 内置 crypto/fs + 全局 fetch),无需 vp install。
      - name: Fetch afdian sponsors
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
        run: node scripts/fetch-sponsors.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain apps/web/public/sponsors.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/web/public/sponsors.json
            git commit -m "chore: sync afdian sponsors"
            git push
          else
            echo "No sponsor changes."
          fi
